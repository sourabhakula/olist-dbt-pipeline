version: 2

models:
  - name: mart_order_performance
    description: >
      Final order-level table combining orders, customers, payments and reviews.
      Contains delivery performance metrics and review sentiment for every order.
    columns:
      - name: order_id
        description: Unique identifier for each order
        data_tests:
          - unique
          - not_null
      - name: order_status
        description: Current status of the order
      - name: delivery_status
        description: On Time, Late, Canceled, or Other based on delivered vs estimated date
      - name: review_sentiment
        description: Positive, Neutral, Negative or No Review based on review score
      - name: delivery_days
        description: Number of days from order placed to delivered
      - name: total_order_value
        description: Sum of product price and freight for the order

  - name: mart_seller_performance
    description: >
      Seller-level aggregated metrics including revenue, order counts, 
      review scores and cancellation rates. Each row is one seller.
    columns:
      - name: seller_id
        description: Unique identifier for each seller
        data_tests:
          - unique
          - not_null
      - name: total_revenue
        description: Total revenue generated by the seller across all orders
      - name: avg_review_score
        description: Average customer review score for this seller
      - name: cancellation_rate_pct
        description: Percentage of orders that were canceled
      - name: seller_tier
        description: Top Seller, Average Seller, or Underperforming based on review score and cancellation rate

  - name: mart_customer_behavior
    description: >
      Customer-level aggregated metrics including total spend, order frequency,
      and customer segmentation. Each row is one unique customer.
    columns:
      - name: customer_id
        description: Unique identifier for each customer
        data_tests:
          - unique
          - not_null
      - name: total_spent
        description: Total amount spent by the customer across all orders
      - name: customer_segment
        description: One Time, Repeat, or Loyal based on number of orders placed
      - name: avg_review_score
        description: Average review score given by this customer